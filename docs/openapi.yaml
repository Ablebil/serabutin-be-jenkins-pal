  # bids module
  /jobs/{id}/bids:
    get:
      tags:
        - Bids
      summary: List bids for a job
      description:
        Returns all bids for a specific job. Accessible by the client who
        posted the job only. Workers can check their own bid status via GET
        /users/me/bids.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Job ID
          example: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, accepted, rejected, withdrawn]
          description: Filter bids by status.
          example: pending
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number.
          example: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Number of bids per page.
          example: 10
      responses:
        "200":
          description: Bids retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Daftar bid berhasil diambil.
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/BidObject"
                  meta:
                    $ref: "#/components/schemas/PaginatedMeta"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Tidak terautentikasi.
        "403":
          description: Forbidden. Not the job owner.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Akses ditolak.
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Pekerjaan tidak ditemukan.
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Bids
      summary: Place a bid on a job
      description:
        Place a bid on a job. Accessible by workers only. A worker can only
        bid once per job, and only when the job status is still open.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Job ID
          example: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - proposed_price
              properties:
                proposed_price:
                  type: number
                  minimum: 0
                  description: Must be between the job's budget_min and budget_max.
                  example: 90000
                message:
                  type: [string, "null"]
                  description: Optional note from the worker for the client.
                  example: Mohon dikerjakan sore hari jika memungkinkan.
      responses:
        "201":
          description: Bid placed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Bid berhasil dikirim.
                  data:
                    $ref: "#/components/schemas/BidObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Tidak terautentikasi.
        "403":
          description: Forbidden. Client is not allowed to bid, or job is no longer open.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Akses ditolak.
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Pekerjaan tidak ditemukan.
        "409":
          description: Worker has already placed a bid on this job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Kamu sudah mengirim bid untuk pekerjaan ini.
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /bids/{id}/accept:
    patch:
      tags:
        - Bids
      summary: Accept a bid
      description:
        Accept a bid. Accessible by the client who posted the job only. Only
        pending bids can be accepted, and only while job slots are available.
        When the acceptance fills the last worker slot, all remaining pending
        bids for that job are automatically rejected by the backend.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Bid ID
          example: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
      responses:
        "200":
          description: Bid accepted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Bid berhasil diterima.
                  data:
                    $ref: "#/components/schemas/BidObject"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Tidak terautentikasi.
        "403":
          description: Forbidden. Not the job owner, job is not open, or bid is not pending.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Akses ditolak.
        "404":
          description: Bid or job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Bid tidak ditemukan.
        "409":
          description: Worker slots are full
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Kuota pekerja sudah penuh.
        "500":
          $ref: "#/components/responses/InternalServerError"

  /bids/{id}:
    delete:
      tags:
        - Bids
      summary: Cancel a bid
      description:
        Cancel a bid. Accessible by the worker who placed the bid only. Only
        possible when the bid status is still pending.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Bid ID
          example: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
      responses:
        "200":
          description: Bid cancelled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Bid berhasil dibatalkan.
                  data:
                    $ref: "#/components/schemas/BidObject"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Tidak terautentikasi.
        "403":
          description: Forbidden. Not the bid owner or bid is not pending.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Akses ditolak.
        "404":
          description: Bid not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Bid tidak ditemukan.
        "500":
          $ref: "#/components/responses/InternalServerError"

  # reviews module
  /jobs/{id}/reviews:
    post:
      tags:
        - Reviews
      summary: Submit a review
      description:
        Submit a review after a job is completed. Both client and worker
        can submit a review, but only once per assignment. Only possible when
        the job status is completed. Worker must use their own assignment_id.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Job ID
          example: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - assignment_id
                - rating
              properties:
                assignment_id:
                  type: string
                  format: uuid
                  description:
                    The assignment ID to review. Required to identify which worker is
                    being reviewed when workers_needed > 1.
                  example: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  example: 4
                comment:
                  type: string
                  maxLength: 1000
                  example: Pekerja ramah dan hasil kerjanya memuaskan.
      responses:
        "201":
          description: Review submitted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Review berhasil dikirim.
                  data:
                    $ref: "#/components/schemas/ReviewObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Tidak terautentikasi.
        "403":
          description: Forbidden. User is not part of this job, or job is not completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Pekerjaan belum selesai.
        "404":
          description:
            Job or assignment not found, or assignment does not belong to this
            job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Assignment tidak ditemukan.
        "409":
          description: Review already submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Kamu sudah mengirim review untuk pekerjaan ini.
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # upload module
  /uploads:
    post:
      tags:
        - Uploads
      summary: Upload a file
      description:
        Upload a file to storage and return the URL. Currently only used
        for avatar upload. Maximum file size is 2MB. Accepted formats are jpg,
        jpeg, and png.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description:
                    Image file to upload. Accepted formats are jpg, jpeg, and png.
                    Maximum size is 2MB.
      responses:
        "201":
          description: File uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: File berhasil diunggah.
                  data:
                    type: object
                    properties:
                      url:
                        type: string
                        example: https://storage.serabutin.com/avatars/01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b.jpg
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Tidak terautentikasi.
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
              example:
                status: error
                message: Data yang dikirim tidak valid.
                errors:
                  file:
                    - Format file tidak didukung. Gunakan jpg, jpeg, atau png.
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Ukuran file maksimal 2MB.
        "500":
          $ref: "#/components/responses/InternalServerError"

  # notifications module
  /notifications:
    get:
      tags:
        - Notifications
      summary: List notifications
      description: Returns a paginated list of notifications for the currently
        authenticated worker, sorted by newest. Supports filtering by read
        status.
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number.
          example: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Number of notifications per page.
          example: 10
        - in: query
          name: is_read
          schema:
            type: boolean
          description: Filter by read status. Omit to return all notifications.
          example: false
      responses:
        "200":
          description: Notifications retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Notifikasi berhasil diambil.
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/NotificationObject"
                  meta:
                    allOf:
                      - $ref: "#/components/schemas/PaginatedMeta"
                      - type: object
                        properties:
                          unread_count:
                            type: integer
                            description:
                              Total number of unread notifications. Useful for notification
                              badge.
                            example: 5
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Tidak terautentikasi.
        "403":
          description: Forbidden. Accessible by workers only.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Akses ditolak.
        "500":
          $ref: "#/components/responses/InternalServerError"

