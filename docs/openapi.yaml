  # jobs module
  /jobs:
    get:
      tags:
        - Jobs
      summary: List jobs feed
      description:
        Returns a paginated list of open jobs ordered by newest with id as a tie-breaker. Uses cursor-based
        pagination. Only jobs with status open are returned. Supports filtering
        by category, city, date posted range, and budget range.
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
          description: Cursor token from meta.next_cursor. Encodes created_at
            and id for the current ordering. Leave empty for the first page.
          example: eyJjcmVhdGVkX2F0IjoiMjAyNi0wNS0wOVQwODowMDowMFoiLCJpZCI6IjAxOTMyYjJhLTdjM2QtN2U0Zi04YTViLTZjN2Q4ZTlmMGExYiIsIl9wb2ludHNUb05leHRJdGVtcyI6dHJ1ZX0
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Number of jobs per page.
          example: 10
        - in: query
          name: category_slug
          schema:
            type: string
          description: Filter by category slug.
          example: bebersih
        - in: query
          name: city
          schema:
            type: string
            enum: [Kota Malang, Kota Batu, Kabupaten Malang]
          description: Filter by city.
          example: Kota Malang
        - in: query
          name: budget_min
          schema:
            type: number
          description: Filter jobs with budget_max >= this value.
          example: 50000
        - in: query
          name: budget_max
          schema:
            type: number
          description: Filter jobs with budget_min <= this value.
          example: 200000
        - in: query
          name: date_from
          schema:
            type: string
            format: date
          description: Filter jobs posted on or after this date.
          example: 2025-04-01
        - in: query
          name: date_to
          schema:
            type: string
            format: date
          description: Filter jobs posted on or before this date.
          example: 2025-04-30
        - in: query
          name: q
          schema:
            type: string
          description: Full-text search on job title.
          example: tukang bebersih
      responses:
        "200":
          description: Jobs retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Daftar pekerjaan berhasil diambil.
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/JobObject"
                  meta:
                    $ref: "#/components/schemas/CursorMeta"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Jobs
      summary: Create a new job
      description: Post a new job. Accessible by clients only.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - category_id
                - title
                - description
                - budget_min
                - budget_max
                - workers_needed
                - location_district
                - location_city
                - start_at
                - deadline_at
              properties:
                category_id:
                  type: string
                  format: uuid
                  example: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
                title:
                  type: string
                  example: Butuh tukang bebersih rumah
                description:
                  type: string
                  example: Rumah 2 lantai, perlu dibersihkan bagian dalam dan luar.
                budget_min:
                  type: number
                  example: 80000
                budget_max:
                  type: number
                  example: 150000
                workers_needed:
                  type: integer
                  minimum: 1
                  example: 2
                location_district:
                  type: string
                  example: Lowokwaru
                location_city:
                  type: string
                  enum: [Kota Malang, Kota Batu, Kabupaten Malang]
                  example: Kota Malang
                start_at:
                  type: string
                  format: date-time
                  example: 2025-05-01T08:00:00Z
                deadline_at:
                  type: string
                  format: date-time
                  example: 2025-05-01T17:00:00Z
      responses:
        "201":
          description: Job created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Pekerjaan berhasil diposting.
                  data:
                    $ref: "#/components/schemas/JobObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Tidak terautentikasi.
        "403":
          description: Forbidden. Worker is not allowed to post a job.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Akses ditolak.
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

