openapi: 3.1.0
info:
  title: Serabutin API
  description: API documentation for Serabutin - Hyperlocal informal worker marketplace
  version: 1.0.0

servers:
  - url: http://localhost:8000/api/v1
    description: Local development server
  - url: https://abilverse.bccdev.id/api/v1
    description: Staging server
  - url: https://serabutin.bccdev.id/api/v1
    description: Production server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Terjadi kesalahan.

    ValidationErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Data yang dikirim tidak valid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            email:
              - Email harus diisi.
            password:
              - Password minimal 8 karakter.

    PaginatedMeta:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 10
        total:
          type: integer
          example: 25
        last_page:
          type: integer
          example: 3

    CursorMeta:
      type: object
      properties:
        next_cursor:
          type: [string, "null"]
          example: eyJpZCI6IjAxOTMyYjJhIn0=
        per_page:
          type: integer
          example: 10
        has_more:
          type: boolean
          example: true

    UserObject:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
        email:
          type: string
          format: email
          example: john@example.com
        full_name:
          type: string
          example: John Doe
        role:
          type: string
          enum: [client, worker]
          example: worker
        is_verified:
          type: boolean
          example: false
        is_active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: 2025-04-25T10:00:00Z
        updated_at:
          type: string
          format: date-time
          example: 2025-04-25T10:00:00Z

    PublicUserObject:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
        full_name:
          type: string
          example: John Doe
        role:
          type: string
          enum: [client, worker]
          example: worker
        created_at:
          type: string
          format: date-time
          example: 2025-04-25T10:00:00Z
        updated_at:
          type: string
          format: date-time
          example: 2025-04-25T10:00:00Z

    UserProfileObject:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
        user_id:
          type: string
          format: uuid
          example: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
        bio:
          type: [string, "null"]
          example: Tukang bersih-bersih profesional berpengalaman 5 tahun.
        location_district:
          type: [string, "null"]
          example: Lowokwaru
        location_city:
          type: [string, "null"]
          example: Kota Malang
        avatar_url:
          type: [string, "null"]
          example: https://storage.serabutin.com/avatars/default.png
        phone:
          type: [string, "null"]
          description:
            Worker only. Null if the requester has no accepted bid with this
            worker.
          example: "081234567890"
        avg_rating:
          type: number
          format: float
          example: 4.8
        total_jobs_posted:
          type: integer
          description: Client only. Always 0 for worker.
          example: 12
        total_jobs_completed:
          type: integer
          description: Worker only. Always 0 for client.
          example: 35
        category_ratings:
          type: array
          description: Worker only. Rating breakdown per category. Not present for client.
          items:
            type: object
            properties:
              category_id:
                type: string
                format: uuid
                example: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
              category_name:
                type: string
                example: Bebersih
              avg_rating:
                type: number
                format: float
                example: 4.8
              review_count:
                type: integer
                example: 10
        created_at:
          type: string
          format: date-time
          example: 2025-04-25T10:00:00Z
        updated_at:
          type: string
          format: date-time
          example: 2025-04-25T10:00:00Z

    CategoryObject:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
        name:
          type: string
          example: Bebersih
        slug:
          type: string
          example: bebersih
        is_active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: 2025-04-25T10:00:00Z
        updated_at:
          type: string
          format: date-time
          example: 2025-04-25T10:00:00Z

    JobObject:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
        client:
          $ref: "#/components/schemas/PublicUserObject"
        category:
          $ref: "#/components/schemas/CategoryObject"
        title:
          type: string
          example: Butuh tukang bebersih rumah
        description:
          type: string
          example: Rumah 2 lantai, perlu dibersihkan bagian dalam dan luar.
        budget_min:
          type: number
          format: float
          example: 80000
        budget_max:
          type: number
          format: float
          example: 150000
        workers_needed:
          type: integer
          example: 2
        location_district:
          type: string
          example: Lowokwaru
        location_city:
          type: string
          example: Kota Malang
        status:
          type: string
          enum: [open, in_progress, completed, cancelled]
          example: open
        start_at:
          type: string
          format: date-time
          example: 2025-05-01T08:00:00Z
        deadline_at:
          type: string
          format: date-time
          example: 2025-05-01T17:00:00Z
        created_at:
          type: string
          format: date-time
          example: 2025-04-25T10:00:00Z
        updated_at:
          type: string
          format: date-time
          example: 2025-04-25T10:00:00Z

    BidObject:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
        worker:
          $ref: "#/components/schemas/PublicUserObject"
        proposed_price:
          type: number
          format: float
          example: 90000
        message:
          type: [string, "null"]
          example: Mohon dikerjakan sore hari jika memungkinkan.
        status:
          type: string
          enum: [pending, accepted, rejected, withdrawn]
          example: pending
        created_at:
          type: string
          format: date-time
          example: 2025-04-25T10:00:00Z
        updated_at:
          type: string
          format: date-time
          example: 2025-04-25T10:00:00Z

    ReviewObject:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
        assignment_id:
          type: string
          format: uuid
          example: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
        reviewer:
          $ref: "#/components/schemas/PublicUserObject"
        reviewee:
          $ref: "#/components/schemas/PublicUserObject"
        category:
          $ref: "#/components/schemas/CategoryObject"
          description: Category of the job being reviewed.
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 4
        comment:
          type: [string, "null"]
          example: Pekerja ramah dan hasil kerjanya memuaskan.
        created_at:
          type: string
          format: date-time
          example: 2025-04-25T10:00:00Z

    NotificationObject:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
        type:
          type: string
          enum: [bid_accepted, bid_rejected]
          example: bid_accepted
        job_id:
          type: string
          format: uuid
          description: Job identifier from the notification payload.
          example: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
        job_title:
          type: string
          description: Job title from the notification payload.
          example: Butuh tukang bebersih rumah
        bid_id:
          type: string
          format: uuid
          description: Bid identifier from the notification payload.
          example: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
        is_read:
          type: boolean
          description: True when the notification has been read.
          example: false
        created_at:
          type: string
          format: date-time
          example: 2025-04-25T10:00:00Z

  responses:
    BadRequest:
      description: Failed to parse request body
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            status: error
            message: Format request tidak valid.

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            status: error
            message: Terjadi kesalahan pada server. Coba lagi nanti.

paths:
  # auth module
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      description:
        Register a new user as client or worker. A verification email will
        be sent after successful registration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - full_name
                - role
              properties:
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  minLength: 8
                  example: secret123
                full_name:
                  type: string
                  example: John Doe
                role:
                  type: string
                  enum: [client, worker]
                  example: worker
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Registrasi berhasil. Silakan cek email untuk verifikasi akun.
                  data:
                    $ref: "#/components/schemas/UserObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Email sudah terdaftar.
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/verify:
    get:
      tags:
        - Auth
      summary: Verify email address
      description:
        Called by the frontend after the user clicks the verification link
        in their email. The token is extracted from the URL query param and sent
        to this endpoint.
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
          description: Email verification token
          example: a1b2c3d4e5f6...
      responses:
        "200":
          description: Email verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Email berhasil diverifikasi. Silakan login.
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Token verifikasi tidak valid atau sudah kedaluwarsa.
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login
      description:
        Authenticate a user. Access token is returned in the response body,
        refresh token (opaque random string) is set as an HttpOnly cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  example: secret123
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              description:
                HttpOnly cookie containing the refresh token. Secure and SameSite
                values depend on environment configuration.
              schema:
                type: string
                example:
                  refresh_token=abc123...; HttpOnly; Secure; SameSite=Lax;
                  Path=/api/v1/auth; Max-Age=86400
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Login berhasil.
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                      token_type:
                        type: string
                        example: Bearer
                      expires_in:
                        type: integer
                        description: Access token expiry in seconds
                        example: 900
                      user:
                        $ref: "#/components/schemas/UserObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Email atau password salah.
        "403":
          description: Email not verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Silakan verifikasi email terlebih dahulu.
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token
      description:
        Rotate the refresh token and issue a new access token. The refresh
        token (opaque random string) is read automatically from the HttpOnly
        cookie.
      parameters:
        - in: cookie
          name: refresh_token
          required: true
          schema:
            type: string
          description: Refresh token stored in HttpOnly cookie
      responses:
        "200":
          description: Token refreshed successfully
          headers:
            Set-Cookie:
              description:
                HttpOnly cookie containing the new refresh token. Secure and
                SameSite values depend on environment configuration.
              schema:
                type: string
                example:
                  refresh_token=xyz789...; HttpOnly; Secure; SameSite=Lax;
                  Path=/api/v1/auth; Max-Age=86400
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Token berhasil diperbarui.
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                      token_type:
                        type: string
                        example: Bearer
                      expires_in:
                        type: integer
                        example: 900
        "401":
          description: Refresh token missing, invalid, or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Refresh token tidak valid atau sudah kedaluwarsa.
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout
      description:
        Invalidate the current refresh token and clear the HttpOnly cookie.
        Requires a valid access token.
      security:
        - BearerAuth: []
      parameters:
        - in: cookie
          name: refresh_token
          required: true
          schema:
            type: string
          description: Refresh token stored in HttpOnly cookie
      responses:
        "200":
          description: Logout successful
          headers:
            Set-Cookie:
              description:
                Clears the refresh token cookie. Secure and SameSite values depend
                on environment configuration.
              schema:
                type: string
                example:
                  refresh_token=; HttpOnly; Secure; SameSite=Lax; Path=/api/v1/auth;
                  Max-Age=0
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Logout berhasil.
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Tidak terautentikasi.
        "500":
          $ref: "#/components/responses/InternalServerError"

  # users module
  /users/me:
    get:
      tags:
        - Users
      summary: Get authenticated user profile
      description:
        Returns the profile of the currently authenticated user, including
        their user_profiles data.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Profil berhasil diambil.
                  data:
                    type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/UserObject"
                      profile:
                        $ref: "#/components/schemas/UserProfileObject"
              examples:
                client_example:
                  summary: Client profile (no category ratings)
                  value:
                    status: success
                    message: Profil berhasil diambil.
                    data:
                      user:
                        id: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
                        email: client@example.com
                        full_name: Jane Client
                        role: client
                        is_verified: true
                        is_active: true
                        created_at: "2025-04-25T10:00:00Z"
                        updated_at: "2025-04-25T10:00:00Z"
                      profile:
                        id: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
                        user_id: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
                        bio: null
                        location_district: Lowokwaru
                        location_city: Kota Malang
                        avatar_url: https://storage.serabutin.com/avatars/default.png
                        phone: "081234567890"
                        avg_rating: 4.5
                        total_jobs_posted: 12
                        total_jobs_completed: 0
                        created_at: "2025-04-25T10:00:00Z"
                        updated_at: "2025-04-25T10:00:00Z"
                worker_example:
                  summary: Worker profile (with category ratings)
                  value:
                    status: success
                    message: Profil berhasil diambil.
                    data:
                      user:
                        id: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
                        email: worker@example.com
                        full_name: John Worker
                        role: worker
                        is_verified: false
                        is_active: true
                        created_at: "2025-04-25T10:00:00Z"
                        updated_at: "2025-04-25T10:00:00Z"
                      profile:
                        id: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
                        user_id: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
                        bio: Tukang bersih-bersih profesional berpengalaman 5 tahun.
                        location_district: Lowokwaru
                        location_city: Kota Malang
                        avatar_url: https://storage.serabutin.com/avatars/worker.png
                        phone: null
                        avg_rating: 4.8
                        total_jobs_posted: 0
                        total_jobs_completed: 35
                        category_ratings:
                          - category_id: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
                            category_name: Bebersih
                            avg_rating: 4.9
                            review_count: 20
                          - category_id: 01932b2a-7c3d-7e4f-8a5b-6c7d8e9f0a1b
                            category_name: Servis AC
                            avg_rating: 4.5
                            review_count: 15
                        created_at: "2025-04-25T10:00:00Z"
                        updated_at: "2025-04-25T10:00:00Z"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Tidak terautentikasi.
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      tags:
        - Users
      summary: Update authenticated user profile
      description:
        Update profile of the currently authenticated user. All fields are
        optional. Phone field is only applicable for clients.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:
                  type: string
                  example: John Doe
                bio:
                  type: string
                  example: Tukang bersih-bersih profesional berpengalaman 5 tahun.
                location_district:
                  type: string
                  example: Lowokwaru
                location_city:
                  type: string
                  enum: [Kota Malang, Kota Batu, Kabupaten Malang]
                  example: Kota Malang
                avatar_url:
                  type: string
                  example: https://storage.serabutin.com/avatars/01932b2a.png
                phone:
                  type: string
                  description: Worker only. Ignored if requester is a client.
                  example: "081234567890"
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Profil berhasil diperbarui.
                  data:
                    type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/UserObject"
                      profile:
                        $ref: "#/components/schemas/UserProfileObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Tidak terautentikasi.
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /users/me/jobs:
    get:
      tags:
        - Users
      summary: Get authenticated client's posted jobs
      description: Returns a paginated list of jobs posted by the currently
        authenticated client. Supports filtering by category and status.
        Accessible by clients only.
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number.
          example: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Number of jobs per page.
          example: 10
        - in: query
          name: category_slug
          schema:
            type: string
          description: Filter by category slug.
          example: bebersih
        - in: query
          name: status
          schema:
            type: string
